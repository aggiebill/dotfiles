#####################
# Options for GnuPG #
#####################

# TODO Place default-key HERE
#default-key 

# Settings

armor
charset utf-8
with-fingerprint
no-greeting
no-emit-version
fixed-list-mode
keyid-format 0xlong
verify-options show-uid-validity
list-options show-uid-validity
require-cross-certification
use-agent

# Algos

personal-digest-preferences SHA512 SHA384 SHA256 SHA224 AES256 AES192 AES CAST5 BZIP2 ZLIB ZIP Uncompressed
cert-digest-algo SHA256
default-preference-list SHA512 SHA384 SHA256 SHA224 AES256 AES192 AES CAST5 ZLIB BZIP2 ZIP Uncompressed

# Keyserver

keyserver hkps://keys.openpgp.org
keyserver-options no-honor-keyserver-url
keyserver-options include-revoked

# Use modern cipher preferences
cipher-algo AES256
digest-algo SHA512
compress-algo ZLIB

# Enable AEAD encryption
aead-algo OCB

# Disable weak algorithms
disable-cipher-algo 3DES
disable-cipher-algo IDEA
disable-digest-algo MD5
disable-digest-algo SHA1

# Other settings
default-preference-list AES256 AES192 AES 3DES SHA512 SHA384 SHA256 SHA224 ZLIB BZIP2 ZIP Uncompressed
personal-cipher-preferences AES256 AES192 AES
personal-digest-preferences SHA512 SHA384 SHA256
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed

# Trust model
trust-model tofu+pgp

# Enable large RSA and Ed25519 keys
default-keyserver-url hkps://keys.openpgp.org
keyid-format 0xlong
with-fingerprint