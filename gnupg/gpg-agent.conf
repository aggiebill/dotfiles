# Pinentry program
pinentry-program /usr/bin/pinentry-gtk-2  # Adjust for your environment (e.g., pinentry-curses for headless)

# Cache settings
default-cache-ttl 300
max-cache-ttl 3600
default-cache-ttl-ssh 300
max-cache-ttl-ssh 3600

# Enable SSH support
enable-ssh-support

# Other settings
allow-loopback-pinentry